const b = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock() {
  const err = document.getElementById('err');
  err.textContent = '';
  const pw = document.getElementById('pw').value.trim();
  if (!pw) return;
  try {
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt: b(SALT), iterations: 200000, hash: 'SHA-256'},
      km, {name:'AES-GCM', length: 256}, false, ['decrypt']);
    const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv: b(IV)}, key, b(CT));
    const html = new TextDecoder().decode(plain);
    document.open(); document.write(html); document.close();
  } catch (e) {
    err.textContent = 'That\u2019s not it \u2014 try again.';
  }
}
document.getElementById('go').addEventListener('click', unlock);
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
